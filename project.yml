name: Little Transparent
options:
  bundleIdPrefix: com.littletransparent
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  Little Transparent:
    type: application
    platform: macOS
    sources:
      - Little Transparent
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.littletransparent.app
        INFOPLIST_FILE: Little Transparent/Info.plist
        CODE_SIGN_ENTITLEMENTS: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: true
        SWIFT_EMIT_LOC_STRINGS: true
        GENERATE_INFOPLIST_FILE: false
    entitlements:
      path: Little Transparent/LittleTransparent.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.files.user-selected.read-only: false
        com.apple.security.files.user-selected.read-write: true
    info:
      path: Little Transparent/Info.plist
      properties:
        CFBundleName: "Little Transparent"
        CFBundleDisplayName: "小透明"
        CFBundleIdentifier: "com.littletransparent.app"
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        LSMinimumSystemVersion: "13.0"
        LSUIElement: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
